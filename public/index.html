<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
</head>
<body>
    <h1>Video Downloader</h1>
    <div id="videoInfo">
        <h2 id="videoTitle">Video Title</h2>
        <img id="videoThumbnail" src="" alt="Video Thumbnail" style="max-width: 100%;" />
        <p id="videoDescription">Video Description</p>
        <a id="downloadLink" href="" download>Download Video</a>
    </div>

    <script>
        function fetchVideoInfo(videoUrl) {
            // Simulated API response for video information
            const videoData = {
                title: 'Sample Video',
                thumbnail: 'https://via.placeholder.com/150',
                description: 'This is a sample description of the video.',
                filename: 'sample_video.mp4'
            };

            // Update the DOM with video information
            document.getElementById('videoTitle').innerText = videoData.title;
            document.getElementById('videoThumbnail').src = videoData.thumbnail;
            document.getElementById('videoDescription').innerText = videoData.description;
            document.getElementById('downloadLink').href = videoUrl;
            document.getElementById('downloadLink').download = videoData.filename;
        }

        // Example usage
        fetchVideoInfo('http://example.com/video.mp4');
    </script>
</body>
</html>
